name: GitHub Classroom Workflow

on:
  push:
    branches: [main]

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all branches
        run: git fetch --all
      - uses: education/autograding@v1
